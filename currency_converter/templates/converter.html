<!DOCTYPE html>
<html>
<head>
    <title>Currency Converter</title>
    <style>
        .converter-form {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="converter-form">
        <h1>Currency Converter</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_amount">Amount:</label>
                {{ form.amount }}
            </div>
            
            <div class="form-group">
                <label for="id_from_currency">From Currency:</label>
                {{ form.from_currency }}
            </div>
            
            <div class="form-group">
                <label for="id_to_currency">To Currency:</label>
                {{ form.to_currency }}
            </div>
            
            <button type="submit">Convert</button>
        </form>
        
        {% if result %}
        <div class="result">
            <h3>Conversion Result:</h3>
            <p>{{ form.cleaned_data.amount }} {{ form.cleaned_data.from_currency }} = 
               {{ result }} {{ form.cleaned_data.to_currency }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
